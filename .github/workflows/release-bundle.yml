name: release-bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install workspace dependencies
        run: npm install --workspaces

      - name: Install Python build tooling
        run: python -m pip install "setuptools>=69" wheel build

      - name: Build Python package
        run: python -m build

      - name: Build CLI
        run: npm --workspace=cli run build

      - name: Build backend
        run: npm --workspace=web/backend run build

      - name: Build frontend
        run: npm --workspace=web/frontend run build

      - name: Assemble release bundle
        run: python tools/build_release_bundle.py

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: codeswarm-release-bundle
          path: |
            release/codeswarm-full.tar.gz
            release/codeswarm-*-full.tar.gz
            release/codeswarm-*/

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/codeswarm-full.tar.gz
            release/codeswarm-*-full.tar.gz
