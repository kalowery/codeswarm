name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces

      - name: Install Python build tooling
        run: python -m pip install "setuptools>=69" wheel

      - name: Install Python package
        run: python -m pip install -e .

      - name: Run Python unit tests
        run: python -m unittest router.test_project_usage router.test_provider_status router.test_worker_runtime_support

      - name: Run Mock Project Smoke
        run: python tools/orchestrated_project_runtime_smoke.py --planner-runtime mock --worker-runtime mock --mode both --router-port 8954

  node-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: "npm"

      - name: Install dependencies
        run: npm install --workspaces

      - name: Build CLI
        run: npm --workspace=cli run build

  python-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build tooling
        run: python -m pip install "setuptools>=69" wheel build

      - name: Build source and wheel distributions
        run: python -m build

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
